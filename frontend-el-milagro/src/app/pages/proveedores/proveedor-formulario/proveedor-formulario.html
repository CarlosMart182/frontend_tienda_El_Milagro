<h2 mat-dialog-title>
  {{ modo === 'crear' ? 'Agregar Proveedor' :
     modo === 'editar' ? 'Editar Proveedor' :
     'Detalle del Proveedor' }}
</h2>

<mat-dialog-content>
  <form [formGroup]="formulario" class="formulario">

    @if (modo !== 'crear') {
      <mat-form-field appearance="outline">
        <mat-label>ID</mat-label>
        <input matInput formControlName="id" readonly>
      </mat-form-field>
    }

    <mat-form-field appearance="outline">
      <mat-label>Nombre del proveedor</mat-label>
      <input matInput formControlName="nombreProveedor" [readonly]="modo === 'ver'">
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Contacto</mat-label>
      <input matInput formControlName="contacto" [readonly]="modo === 'ver'">
    </mat-form-field>

  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cerrar()">Cancelar</button>

  @if (modo !== 'ver') {
    <button mat-raised-button color="primary" (click)="guardar()">
      Guardar
    </button>
  }
</mat-dialog-actions>
